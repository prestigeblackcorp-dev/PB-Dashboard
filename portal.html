<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prestige Black — Member Portal</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0a0a;--surface:#1a1a1a;--border:#2a2a2a;
    --gold:#C9A962;--gold-dim:#8a7040;
    --text:#ffffff;--text-muted:#888;
    --green:#22c55e;--yellow:#eab308;--blue:#3b82f6;--gray:#6b7280;--red:#ef4444;
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
  /* Auth */
  #auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .auth-logo{font-size:28px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:8px;}
  .auth-sub{color:var(--text-muted);font-size:13px;margin-bottom:40px;text-align:center;}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:380px;}
  .auth-title{font-size:18px;font-weight:600;margin-bottom:6px;}
  .auth-desc{font-size:13px;color:var(--text-muted);margin-bottom:20px;}
  .field-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;}
  input[type=email],input[type=text],input[type=number],input[type=date],select{
    background:#111;border:1px solid var(--border);border-radius:10px;color:var(--text);
    font-size:15px;padding:12px 14px;width:100%;outline:none;
    -webkit-appearance:none;appearance:none;
  }
  input:focus,select:focus{border-color:var(--gold);}
  .otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:4px;}
  .otp-digit{
    background:#111;border:1px solid var(--border);border-radius:10px;color:var(--text);
    font-size:22px;font-weight:700;text-align:center;width:46px;height:56px;outline:none;
    -webkit-appearance:none;caret-color:var(--gold);
  }
  .otp-digit:focus{border-color:var(--gold);}
  .btn{
    background:var(--gold);border:none;border-radius:10px;color:#000;cursor:pointer;
    font-size:15px;font-weight:700;padding:14px;width:100%;margin-top:16px;
    letter-spacing:.5px;transition:opacity .15s;
  }
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn:not(:disabled):active{opacity:.7;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-weight:400;}
  /* App */
  #app-screen{display:none;flex-direction:column;height:100vh;overflow:hidden;}
  /* Tab bar */
  .tab-bar{
    display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);
    -webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;
  }
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-item{
    flex:0 0 auto;padding:14px 20px;font-size:13px;cursor:pointer;
    color:var(--text-muted);white-space:nowrap;border-bottom:2px solid transparent;
    transition:color .15s;
  }
  .tab-item.active{color:var(--gold);border-bottom-color:var(--gold);}
  /* Tab content */
  .tab-content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
  .tab-pane{display:none;}
  .tab-pane.active{display:block;}
  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
  .vehicle-name{font-size:16px;font-weight:700;}
  .badge{
    font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;
    flex-shrink:0;
  }
  .badge-pending{background:rgba(234,179,8,.15);color:var(--yellow);}
  .badge-confirmed{background:rgba(34,197,94,.15);color:var(--green);}
  .badge-in-progress{background:rgba(59,130,246,.15);color:var(--blue);}
  .badge-completed{background:rgba(107,114,128,.2);color:var(--gray);}
  .badge-cancelled{background:rgba(239,68,68,.15);color:var(--red);}
  .badge-active{background:rgba(34,197,94,.15);color:var(--green);}
  .badge-expired{background:rgba(239,68,68,.15);color:var(--red);}
  .booking-meta{font-size:13px;color:var(--text-muted);margin-bottom:4px;}
  .booking-meta span{color:var(--text);}
  /* Progress bar */
  .progress-wrap{margin:14px 0 0;}
  .progress-row{display:flex;align-items:center;position:relative;}
  .progress-line{flex:1;height:2px;background:var(--border);}
  .progress-line.done{background:var(--gold);}
  .progress-dot{
    width:12px;height:12px;border-radius:50%;border:2px solid var(--border);
    background:var(--surface);flex-shrink:0;position:relative;z-index:1;
  }
  .progress-dot.done{background:var(--gold);border-color:var(--gold);}
  .progress-dot.current{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,98,.2);}
  .progress-labels{display:flex;justify-content:space-between;margin-top:6px;}
  .progress-label{font-size:9px;color:var(--text-muted);text-align:center;flex:1;}
  .progress-label.active{color:var(--gold);}
  /* Condition section */
  .section-title{font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin:16px 0 10px;}
  .condition-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .condition-col-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:600;}
  .photo-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .photo-thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer;}
  .add-photo-btn{
    width:64px;height:64px;border:1.5px dashed var(--border);border-radius:8px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    color:var(--text-muted);font-size:22px;background:transparent;
    flex-shrink:0;
  }
  .add-photo-btn:hover{border-color:var(--gold);color:var(--gold);}
  /* Saved grid */
  .vehicles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .vehicle-card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:14px;text-align:center;cursor:pointer;position:relative;
  }
  .vehicle-emoji{font-size:32px;margin-bottom:6px;}
  .vehicle-card-name{font-size:13px;font-weight:600;}
  .heart-btn{
    position:absolute;top:8px;right:8px;background:transparent;border:none;
    font-size:18px;cursor:pointer;color:var(--red);
  }
  /* Insurance */
  .ins-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
  .ins-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
  .ins-row:last-child{border-bottom:none;}
  .ins-key{font-size:13px;color:var(--text-muted);}
  .ins-val{font-size:13px;font-weight:600;}
  .form-group{margin-bottom:14px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  /* Account */
  .account-avatar{
    width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;
    color:#000;margin-right:14px;flex-shrink:0;
  }
  .account-header{display:flex;align-items:center;margin-bottom:16px;}
  .account-info .name{font-size:18px;font-weight:700;}
  .account-info .email{font-size:13px;color:var(--text-muted);margin-top:2px;}
  .stat-row{display:flex;gap:10px;margin-bottom:16px;}
  .stat-card{
    flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:14px;text-align:center;
  }
  .stat-num{font-size:24px;font-weight:700;color:var(--gold);}
  .stat-label{font-size:11px;color:var(--text-muted);margin-top:4px;}
  .sign-out-btn{
    background:transparent;border:1px solid var(--red);border-radius:10px;
    color:var(--red);cursor:pointer;font-size:14px;padding:12px;width:100%;
    font-weight:600;margin-top:8px;
  }
  /* Toast */
  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:#222;border:1px solid var(--border);border-radius:10px;
    padding:10px 18px;font-size:13px;pointer-events:none;
    opacity:0;transition:opacity .25s;z-index:9999;white-space:nowrap;max-width:90vw;
  }
  #toast.show{opacity:1;}
  #toast.success{border-color:var(--green);color:var(--green);}
  #toast.error{border-color:var(--red);color:var(--red);}
  /* Spinner */
  .spinner{
    display:inline-block;width:20px;height:20px;
    border:2px solid rgba(201,169,98,.3);border-top-color:var(--gold);
    border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading-overlay{
    position:fixed;inset:0;background:rgba(10,10,10,.85);
    display:flex;align-items:center;justify-content:center;z-index:9998;
  }
  #loading-overlay.hidden{display:none;}
  .empty-state{text-align:center;padding:40px 16px;color:var(--text-muted);}
  .empty-icon{font-size:40px;margin-bottom:10px;}
  /* Photo modal */
  #photo-modal{
    position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9990;
    display:flex;align-items:center;justify-content:center;display:none;
  }
  #photo-modal img{max-width:95vw;max-height:90vh;border-radius:10px;}
  #photo-modal .close-modal{
    position:fixed;top:16px;right:16px;background:rgba(255,255,255,.1);
    border:none;color:#fff;border-radius:50%;width:36px;height:36px;
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-logo">PRESTIGE BLACK</div>
  <div class="auth-sub">Member Portal</div>

  <!-- Step 1: Email -->
  <div class="auth-card" id="step-email">
    <div class="auth-title">Sign In</div>
    <div class="auth-desc">Enter your email address to receive a login code.</div>
    <div class="form-group">
      <label class="field-label">Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn" id="send-code-btn" onclick="requestOTP()">Send Code</button>
  </div>

  <!-- Step 2: OTP -->
  <div class="auth-card" id="step-otp" style="display:none;">
    <div class="auth-title">Check Your Email</div>
    <div class="auth-desc" id="otp-desc">We sent a 6-digit code to your email. It expires in 10 minutes.</div>
    <div class="otp-row" id="otp-inputs">
      <input class="otp-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input class="otp-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input class="otp-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input class="otp-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input class="otp-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]*">
      <input class="otp-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]*">
    </div>
    <button class="btn" id="verify-btn" onclick="verifyOTP()">Verify Code</button>
    <button class="btn btn-ghost" style="margin-top:8px;" onclick="backToEmail()">Back</button>
  </div>
</div>

<!-- App Screen -->
<div id="app-screen">
  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active" data-tab="bookings" onclick="switchTab('bookings')">📅 Bookings</div>
    <div class="tab-item" data-tab="saved" onclick="switchTab('saved')">❤️ Saved</div>
    <div class="tab-item" data-tab="insurance" onclick="switchTab('insurance')">🛡 Insurance</div>
    <div class="tab-item" data-tab="account" onclick="switchTab('account')">👤 Account</div>
  </div>

  <!-- Tab Contents -->
  <div class="tab-content">

    <!-- Bookings -->
    <div class="tab-pane active" id="tab-bookings">
      <div id="bookings-list"></div>
    </div>

    <!-- Saved -->
    <div class="tab-pane" id="tab-saved">
      <div id="saved-list"></div>
    </div>

    <!-- Insurance -->
    <div class="tab-pane" id="tab-insurance">
      <div id="insurance-display"></div>
      <div class="section-title">Update Insurance</div>
      <div class="card">
        <div class="form-group">
          <label class="field-label">Insurance Provider</label>
          <input type="text" id="ins-provider" placeholder="e.g. State Farm">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="field-label">Policy Number</label>
            <input type="text" id="ins-policy" placeholder="ABC123456">
          </div>
          <div class="form-group">
            <label class="field-label">Expiry Date</label>
            <input type="date" id="ins-expiry">
          </div>
        </div>
        <div class="form-group">
          <label class="field-label">Coverage Type</label>
          <select id="ins-coverage">
            <option value="">Select coverage...</option>
            <option>Comprehensive</option>
            <option>Collision</option>
            <option>Liability</option>
            <option>Full Coverage</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="field-label">Agent Name (optional)</label>
          <input type="text" id="ins-agent" placeholder="Agent name">
        </div>
        <button class="btn" onclick="saveInsurance()">Save Insurance</button>
      </div>
    </div>

    <!-- Account -->
    <div class="tab-pane" id="tab-account">
      <div id="account-content"></div>
    </div>

  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner" style="width:36px;height:36px;border-width:3px;"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Photo modal -->
<div id="photo-modal" onclick="closePhotoModal()">
  <button class="close-modal" onclick="closePhotoModal()">✕</button>
  <img id="photo-modal-img" src="" alt="">
</div>

<!-- Hidden file inputs -->
<input type="file" id="photo-upload-input" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">

<script>
const WORKER = 'https://pb-booking.prestigeblackcorp.workers.dev';
let state = {
  email: localStorage.getItem('pb_portal_email') || '',
  token: localStorage.getItem('pb_portal_token') || '',
  bookings: [],
  insurance: null,
  savedVehicles: [],
  pendingPhotoUpload: null, // { bookingId, type }
};

// ── Utilities ──────────────────────────────────────────────────────────────

function showLoading(){ document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading(){ document.getElementById('loading-overlay').classList.add('hidden'); }

function toast(msg, type='info'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.className=''; }, 3000);
}

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function bookingRef(id){
  return 'PBR-' + (id||'').slice(-6).toUpperCase();
}

function statusBadge(status){
  const map = {
    'pending':'pending','confirmed':'confirmed','in-progress':'in-progress',
    'in_progress':'in-progress','completed':'completed','cancelled':'cancelled','active':'in-progress'
  };
  const cls = map[(status||'').toLowerCase()] || 'pending';
  const labels = {
    'pending':'PENDING','confirmed':'CONFIRMED','in-progress':'IN PROGRESS',
    'completed':'COMPLETED','cancelled':'CANCELLED'
  };
  return `<span class="badge badge-${cls}">${labels[cls]||status.toUpperCase()}</span>`;
}

function progressBar(status){
  const s = (status||'').toLowerCase();
  // Steps: submitted(0), confirmed(1), active(2), complete(3)
  const step = s==='cancelled'?-1: s==='pending'?0: s==='confirmed'?1: (s==='in-progress'||s==='in_progress'||s==='active')?2: s==='completed'?3: 0;
  if(step<0) return '';
  const labels=['Submitted','Confirmed','Active','Complete'];
  let html = '<div class="progress-wrap"><div class="progress-row">';
  for(let i=0;i<4;i++){
    if(i>0) html += `<div class="progress-line${step>=i?' done':''}"></div>`;
    const cls = step>i?'done':step===i?'current':'';
    html += `<div class="progress-dot ${cls}"></div>`;
  }
  html += '</div><div class="progress-labels">';
  for(let i=0;i<4;i++){
    html += `<span class="progress-label${step===i?' active':''}">${labels[i]}</span>`;
  }
  html += '</div></div>';
  return html;
}

function showCondition(booking){
  const s = (booking.status||'').toLowerCase();
  if(!['confirmed','in-progress','in_progress','active','completed'].includes(s)) return '';

  const preOwner = booking.checkInPhotos || [];
  const postOwner = booking.incPhotoData || [];
  const preCust = booking.customerPreTripPhotos || [];
  const postCust = booking.customerPostTripPhotos || [];

  const renderPhotos = (arr, type, bookingId) => {
    let html = '<div class="photo-grid">';
    arr.forEach(src => {
      html += `<img class="photo-thumb" src="${src}" onclick="openPhotoModal('${src}')">`;
    });
    html += `<button class="add-photo-btn" onclick="triggerPhotoUpload('${bookingId}','${type}')">+</button>`;
    html += '</div>';
    return html;
  };

  const allPre = [...preOwner, ...preCust];
  const allPost = [...postOwner, ...postCust];

  return `
    <div class="section-title">Vehicle Condition</div>
    <div class="condition-cols">
      <div>
        <div class="condition-col-label">Pre-Trip</div>
        ${renderPhotos(allPre,'pre',booking.id)}
      </div>
      <div>
        <div class="condition-col-label">Post-Trip</div>
        ${renderPhotos(allPost,'post',booking.id)}
      </div>
    </div>`;
}

function sortBookings(bookings){
  const order = {'in-progress':0,'in_progress':0,'active':0,'confirmed':1,'pending':2,'completed':3,'cancelled':4};
  return [...bookings].sort((a,b)=>{
    const oa = order[(a.status||'').toLowerCase()] ?? 5;
    const ob = order[(b.status||'').toLowerCase()] ?? 5;
    if(oa!==ob) return oa-ob;
    return new Date(a.pickupDate||0) - new Date(b.pickupDate||0);
  });
}

// ── Auth ───────────────────────────────────────────────────────────────────

async function requestOTP(){
  const email = document.getElementById('login-email').value.trim();
  if(!email){ toast('Enter your email address','error'); return; }
  showLoading();
  try{
    const r = await fetch(`${WORKER}/portal/request-otp`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    const d = await r.json();
    if(!r.ok){ toast(d.error||'Error sending code','error'); return; }
    state.email = email;
    document.getElementById('step-email').style.display='none';
    document.getElementById('step-otp').style.display='block';
    document.getElementById('otp-desc').textContent = `We sent a 6-digit code to ${email}. It expires in 10 minutes.`;
    setTimeout(()=>{ document.querySelector('.otp-digit').focus(); },100);
    toast('Code sent! Check your email.','success');
  }catch(e){ toast('Network error. Try again.','error'); }
  finally{ hideLoading(); }
}

function backToEmail(){
  document.getElementById('step-otp').style.display='none';
  document.getElementById('step-email').style.display='block';
  document.querySelectorAll('.otp-digit').forEach(i=>i.value='');
}

async function verifyOTP(){
  const digits = [...document.querySelectorAll('.otp-digit')].map(i=>i.value).join('');
  if(digits.length<6){ toast('Enter the full 6-digit code','error'); return; }
  showLoading();
  try{
    const r = await fetch(`${WORKER}/portal/verify-otp`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:state.email, otp:digits})
    });
    const d = await r.json();
    if(!r.ok){ toast(d.error||'Invalid code','error'); return; }
    state.token = d.token;
    localStorage.setItem('pb_portal_token', d.token);
    localStorage.setItem('pb_portal_email', state.email);
    await loadPortalData();
    showApp();
  }catch(e){ toast('Network error. Try again.','error'); }
  finally{ hideLoading(); }
}

// OTP digit navigation
document.addEventListener('DOMContentLoaded',()=>{
  const digits = document.querySelectorAll('.otp-digit');
  digits.forEach((inp,i)=>{
    inp.addEventListener('input',()=>{
      const v = inp.value.replace(/[^0-9]/g,'');
      inp.value = v.slice(-1);
      if(v && i<digits.length-1) digits[i+1].focus();
    });
    inp.addEventListener('keydown',e=>{
      if(e.key==='Backspace'&&!inp.value&&i>0) digits[i-1].focus();
    });
    inp.addEventListener('paste',e=>{
      const paste = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
      if(paste.length>=6){
        e.preventDefault();
        [...paste.slice(0,6)].forEach((ch,j)=>{ digits[j].value=ch; });
        digits[5].focus();
      }
    });
  });

  // Auto-login if token exists
  hideLoading();
  if(state.token && state.email){
    showLoading();
    loadPortalData().then(ok=>{
      if(ok){ showApp(); }
      else{
        localStorage.removeItem('pb_portal_token');
        localStorage.removeItem('pb_portal_email');
        state.token=''; state.email='';
        hideLoading();
      }
    });
  }
});

// ── App ────────────────────────────────────────────────────────────────────

function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  renderAll();
  hideLoading();
}

async function loadPortalData(){
  try{
    const r = await fetch(`${WORKER}/portal/data?email=${encodeURIComponent(state.email)}&token=${encodeURIComponent(state.token)}`);
    if(!r.ok){ return false; }
    const d = await r.json();
    state.bookings = d.bookings || [];
    state.insurance = d.insurance || null;
    state.savedVehicles = d.savedVehicles || [];
    return true;
  }catch(e){ return false; }
}

function switchTab(tab){
  document.querySelectorAll('.tab-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===tab);
  });
  document.querySelectorAll('.tab-pane').forEach(el=>{
    el.classList.toggle('active', el.id==='tab-'+tab);
  });
}

function renderAll(){
  renderBookings();
  renderSaved();
  renderInsurance();
  renderAccount();
}

// ── Bookings ───────────────────────────────────────────────────────────────

function renderBookings(){
  const el = document.getElementById('bookings-list');
  const sorted = sortBookings(state.bookings);
  if(!sorted.length){
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><div>No bookings found.</div></div>`;
    return;
  }
  el.innerHTML = sorted.map(b => {
    const dateRange = `${fmtDate(b.pickupDate)} → ${fmtDate(b.dropoffDate||b.returnDate)}`;
    const price = b.totalPrice || b.price || b.total || '';
    const priceStr = price ? `$${Number(price).toLocaleString()}` : '';
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="vehicle-name">${b.vehicleEmoji||'🚗'} ${b.vehicle||b.vehicleName||'Vehicle'}</div>
            <div class="booking-meta" style="margin-top:4px;">${dateRange}</div>
          </div>
          ${statusBadge(b.status||'pending')}
        </div>
        <div class="booking-meta">${priceStr?`<span>${priceStr}</span> &nbsp;·&nbsp; `:''}${bookingRef(b.id)}</div>
        ${progressBar(b.status)}
        ${showCondition(b)}
      </div>`;
  }).join('');
}

// ── Saved ──────────────────────────────────────────────────────────────────

function renderSaved(){
  const el = document.getElementById('saved-list');
  if(!state.savedVehicles.length){
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">❤️</div><div>No saved vehicles yet.</div></div>`;
    return;
  }
  el.innerHTML = `<div class="vehicles-grid">${state.savedVehicles.map((v,i)=>`
    <div class="vehicle-card">
      <div class="vehicle-emoji">${v.emoji||'🚗'}</div>
      <div class="vehicle-card-name">${v.name||v}</div>
      <button class="heart-btn" onclick="removeSaved(${i})">❤️</button>
    </div>`).join('')}</div>`;
}

async function removeSaved(idx){
  state.savedVehicles.splice(idx,1);
  renderSaved();
  try{
    await fetch(`${WORKER}/portal/save-vehicles`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:state.email, token:state.token, savedVehicles:state.savedVehicles})
    });
    toast('Vehicle removed','success');
  }catch(e){ toast('Error saving','error'); }
}

// ── Insurance ──────────────────────────────────────────────────────────────

function renderInsurance(){
  const el = document.getElementById('insurance-display');
  const ins = state.insurance;
  if(!ins){
    el.innerHTML = `<div class="ins-card"><div style="color:var(--text-muted);font-size:13px;">No insurance on file.</div></div>`;
    return;
  }
  const expiry = ins.expiry ? new Date(ins.expiry) : null;
  const isActive = expiry && expiry > new Date();
  const badge = `<span class="badge ${isActive?'badge-confirmed':'badge-cancelled'}">${isActive?'ACTIVE':'EXPIRED'}</span>`;
  el.innerHTML = `
    <div class="ins-card">
      <div class="card-header" style="margin-bottom:8px;">
        <div style="font-weight:700;font-size:15px;">Insurance on File</div>
        ${badge}
      </div>
      ${ins.provider?`<div class="ins-row"><span class="ins-key">Provider</span><span class="ins-val">${ins.provider}</span></div>`:''}
      ${ins.policy?`<div class="ins-row"><span class="ins-key">Policy #</span><span class="ins-val">${ins.policy}</span></div>`:''}
      ${ins.expiry?`<div class="ins-row"><span class="ins-key">Expiry</span><span class="ins-val">${fmtDate(ins.expiry)}</span></div>`:''}
      ${ins.coverage?`<div class="ins-row"><span class="ins-key">Coverage</span><span class="ins-val">${ins.coverage}</span></div>`:''}
      ${ins.agent?`<div class="ins-row"><span class="ins-key">Agent</span><span class="ins-val">${ins.agent}</span></div>`:''}
    </div>`;

  // Pre-fill form
  if(ins.provider) document.getElementById('ins-provider').value = ins.provider;
  if(ins.policy) document.getElementById('ins-policy').value = ins.policy;
  if(ins.expiry) document.getElementById('ins-expiry').value = ins.expiry;
  if(ins.coverage) document.getElementById('ins-coverage').value = ins.coverage;
  if(ins.agent) document.getElementById('ins-agent').value = ins.agent;
}

async function saveInsurance(){
  const ins = {
    provider: document.getElementById('ins-provider').value.trim(),
    policy: document.getElementById('ins-policy').value.trim(),
    expiry: document.getElementById('ins-expiry').value,
    coverage: document.getElementById('ins-coverage').value,
    agent: document.getElementById('ins-agent').value.trim(),
  };
  if(!ins.provider||!ins.policy){ toast('Provider and policy number required','error'); return; }
  showLoading();
  try{
    const r = await fetch(`${WORKER}/portal/save-insurance`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:state.email, token:state.token, insurance:ins})
    });
    const d = await r.json();
    if(!r.ok){ toast(d.error||'Error saving','error'); return; }
    state.insurance = ins;
    renderInsurance();
    toast('Insurance saved!','success');
  }catch(e){ toast('Network error','error'); }
  finally{ hideLoading(); }
}

// ── Account ────────────────────────────────────────────────────────────────

function renderAccount(){
  const el = document.getElementById('account-content');
  const email = state.email;
  const bookings = state.bookings;
  const firstBooking = [...bookings].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0))[0];
  const memberSince = firstBooking ? fmtDate(firstBooking.createdAt) : 'N/A';
  const name = (firstBooking?.customerName || firstBooking?.name || email.split('@')[0]);
  const phone = firstBooking?.phone || firstBooking?.customerPhone || '';
  const initial = (name||'?')[0].toUpperCase();

  el.innerHTML = `
    <div class="card">
      <div class="account-header">
        <div class="account-avatar">${initial}</div>
        <div class="account-info">
          <div class="name">${name}</div>
          <div class="email">${email}</div>
          ${phone?`<div class="email" style="margin-top:2px;">${phone}</div>`:''}
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);">Member since <span style="color:var(--gold);">${memberSince}</span></div>
    </div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num">${bookings.length}</div>
        <div class="stat-label">Total Bookings</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${bookings.filter(b=>(b.status||'').toLowerCase()==='completed').length}</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>
    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>`;
}

function signOut(){
  localStorage.removeItem('pb_portal_token');
  localStorage.removeItem('pb_portal_email');
  state.token=''; state.email=''; state.bookings=[]; state.insurance=null; state.savedVehicles=[];
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('step-otp').style.display='none';
  document.getElementById('step-email').style.display='block';
  document.getElementById('login-email').value='';
  toast('Signed out');
}

// ── Photos ─────────────────────────────────────────────────────────────────

function triggerPhotoUpload(bookingId, type){
  state.pendingPhotoUpload = { bookingId, type };
  document.getElementById('photo-upload-input').click();
}

function handlePhotoUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const photo = ev.target.result;
    const { bookingId, type } = state.pendingPhotoUpload || {};
    if(!bookingId) return;
    showLoading();
    try{
      const r = await fetch(`${WORKER}/portal/save-photo`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:state.email, token:state.token, bookingId, type, photo})
      });
      const d = await r.json();
      if(!r.ok){ toast(d.error||'Error uploading','error'); return; }
      // Update local state
      const bk = state.bookings.find(b=>b.id===bookingId);
      if(bk){
        if(type==='pre'){ bk.customerPreTripPhotos = [...(bk.customerPreTripPhotos||[]), photo]; }
        else{ bk.customerPostTripPhotos = [...(bk.customerPostTripPhotos||[]), photo]; }
      }
      renderBookings();
      toast('Photo uploaded!','success');
    }catch(e){ toast('Upload failed','error'); }
    finally{
      hideLoading();
      e.target.value='';
      state.pendingPhotoUpload = null;
    }
  };
  reader.readAsDataURL(file);
}

function openPhotoModal(src){
  document.getElementById('photo-modal-img').src = src;
  document.getElementById('photo-modal').style.display='flex';
}
function closePhotoModal(){
  document.getElementById('photo-modal').style.display='none';
}
</script>
