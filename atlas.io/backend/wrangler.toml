name = "atlas"
main = "worker.js"
compatibility_date = "2026-01-01"

# Created by: wrangler d1 create atlas  ->  paste the printed database_id below
[[d1_databases]]
binding = "DB"
database_name = "atlas"
database_id = "PASTE_AFTER_d1_create"

# Secrets are NOT set here (they'd be committed). Set them with:
#   wrangler secret put SESSION_KEY        # openssl rand -base64 48
#   wrangler secret put ENC_KEY            # openssl rand -base64 32   (must decode to 32 bytes)
#   wrangler secret put OWNER_EMAIL        # prestigeblackcorp@gmail.com
# Per-integration (added in their phases):
#   STRIPE_SECRET  STRIPE_WEBHOOK_SECRET  RESEND_KEY  TWILIO_SID  TWILIO_TOKEN  ANTHROPIC_KEY  DYNADOT_KEY
