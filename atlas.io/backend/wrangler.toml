name = "atlas"
main = "worker.js"
compatibility_date = "2026-01-01"

# SAFETY: never delete plaintext vars / secrets that were set in the Cloudflare dashboard
# but are not declared in this file. Protects your existing config on the first `wrangler deploy`.
keep_vars = true

# Stream logs (errors + cron runs) to the dashboard: Workers > atlas > Logs.
[observability]
enabled = true

# Daily maintenance + lifecycle emails + overnight dreaming/competitor crawl -> scheduled() handler.
# scheduled() writes a `cron_last_run` heartbeat that /api/health exposes as cron_age_min.
[triggers]
# Every 2 hours: Atlas Counsel + cheap learning refresh each tick; the EXPENSIVE AI (brief, competitor deep-read/crawl)
# self-gates to ~once/20h inside scheduled() via _due(), so this stays budget-safe while learning runs ~24/7.
crons = ["0 */2 * * *"]

# ---- D1 (binding env.DB) -----------------------------------------------------
# Get database_id from:  wrangler d1 create atlas   (or Cloudflare dashboard > D1 > atlas > copy ID).
# This MUST stay declared so `wrangler deploy` preserves the live D1 binding.
[[d1_databases]]
binding = "DB"
database_name = "atlas"
database_id = "76c32a35-7695-48cd-9bec-58f8703b066f"

# ---- R2 file storage (binding env.R2) ---------------------------------------
# Powers portal uploads (ID / pickup / condition photos) + tenant files. Without it those degrade honestly.
# MUST stay declared here: a `wrangler deploy` sets the worker's bindings to exactly what this file lists, so a
# bucket bound only in the Cloudflare dashboard gets WIPED on the next deploy (keep_vars protects vars/secrets,
# NOT bindings). Bucket = pb-videos (shared with Prestige Black); the worker namespaces every Atlas object under
# an `atlas/...` key prefix (see #284) so Atlas and PB files never collide in the shared bucket.
[[r2_buckets]]
binding = "R2"
bucket_name = "pb-videos"

# ---- Staging environment (bake changes against real requests before production) ------------------------------
# Deploy with: wrangler deploy --env staging   (or the deploy-staging CI job on PRs).
# One-time owner setup: `wrangler d1 create atlas-staging` -> paste its id below; secrets are per-env
# (`wrangler secret put NAME --env staging`). Use TEST Stripe keys here so staging never touches real money.
[env.staging]
name = "atlas-staging"
[[env.staging.d1_databases]]
binding = "DB"
database_name = "atlas-staging"
database_id = "PASTE_YOUR_STAGING_D1_DATABASE_ID"

# ---- Secrets (NOT stored in this file) --------------------------------------
# Existing dashboard secrets survive `wrangler deploy`. To set or rotate one:
#   wrangler secret put SESSION_KEY        # openssl rand -base64 48
#   wrangler secret put ENC_KEY            # openssl rand -base64 32  (must decode to 32 bytes)
#   wrangler secret put ADMIN_TOKEN        # your master-dashboard key
# Full list the worker reads (set the ones you use):
#   ADMIN_TOKEN SESSION_KEY ENC_KEY ENC_KEY_2 OWNER_EMAIL OWNER_SETUP_TOKEN
#   ANTHROPIC_KEY OPENAI_KEY GEMINI_KEY SEARCH_KEY
#   RESEND_KEY MAIL_FROM SUPPORT_EMAIL INBOUND_SECRET
#   PLATFORM_STRIPE_KEY STRIPE_WEBHOOK_SECRET PLATFORM_STRIPE_TEST_KEY STRIPE_WEBHOOK_SECRET_TEST
#   TWILIO_SID TWILIO_TOKEN TWILIO_FROM
#   CF_API_TOKEN CF_ZONE_ID APP_ORIGIN APP_ZONE SAAS_TARGET
#   DYNADOT_KEY DYNADOT_SANDBOX DOMAIN_MARKUP_PCT
#
# FIRST-TIME SAFETY: before the very first `wrangler deploy`, run:
#   wrangler deploy --dry-run
# and confirm it reports the DB (and R2, if uncommented) bindings and does NOT warn about removing others.
